[package]
name = "allroads"
version = "1.1.0"
edition = "2021"

[dependencies]
eframe = "0.29"
egui = "0.29"
chrono = "0.4"
rusqlite = { version = "0.40", features = ["bundled-sqlcipher"] }
rand = "0.8"
hex = "0.4"
keyring = "2"

[profile.dev]
opt-level = 1

[profile.release]
opt-level = 1
strip = true
